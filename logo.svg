<svg viewBox="0 0 400 92" width="400" height="92"
     xmlns="http://www.w3.org/2000/svg"
     role="img" aria-label="САХАРА — Сонячні системи">

  <defs>
    <clipPath id="mark-clip">
      <rect x="4" y="4" width="84" height="84" rx="20"/>
    </clipPath>
  </defs>

  <!-- ══ ICON MARK ══ -->

  <!-- Background -->
  <rect x="4" y="4" width="84" height="84" rx="20" fill="#1A2B4A"/>

  <!-- Inner glow & content — clipped to rounded square -->
  <g clip-path="url(#mark-clip)">

    <!-- Ambient glow behind sun -->
    <circle cx="46" cy="36" r="30" fill="#FF6B00" opacity="0.12"/>

    <!-- Sun body -->
    <circle cx="46" cy="36" r="15" fill="#FF6B00"/>

    <!-- Sun highlight -->
    <circle cx="42" cy="31" r="4.5" fill="white" opacity="0.28"/>

    <!-- Sun rays (7 rays, none pointing straight down — sun shines onto panels) -->
    <g stroke="#FF6B00" stroke-width="3" stroke-linecap="round">
      <!-- top -->
      <line x1="46" y1="17" x2="46" y2="12"/>
      <!-- top-right -->
      <line x1="58.6" y1="22.4" x2="62.2" y2="18.8"/>
      <!-- right -->
      <line x1="65" y1="36"  x2="70" y2="36"/>
      <!-- bottom-right -->
      <line x1="58.6" y1="49.6" x2="62.2" y2="53.2"/>
      <!-- bottom-left -->
      <line x1="33.4" y1="49.6" x2="29.8" y2="53.2"/>
      <!-- left -->
      <line x1="27" y1="36"  x2="22" y2="36"/>
      <!-- top-left -->
      <line x1="33.4" y1="22.4" x2="29.8" y2="18.8"/>
    </g>

    <!-- ── Solar panel array (3 rows × 3 cells) ── -->

    <!-- Row 1 -->
    <rect x="12" y="59" width="68" height="7" fill="#FF6B00"/>
    <line x1="35.3" y1="59" x2="35.3" y2="66" stroke="#1A2B4A" stroke-width="1.5"/>
    <line x1="58.7" y1="59" x2="58.7" y2="66" stroke="#1A2B4A" stroke-width="1.5"/>

    <!-- Row separator 1 -->
    <rect x="12" y="66" width="68" height="2" fill="#1A2B4A" opacity="0.55"/>

    <!-- Row 2 -->
    <rect x="12" y="68" width="68" height="7" fill="#FF6B00" opacity="0.72"/>
    <line x1="35.3" y1="68" x2="35.3" y2="75" stroke="#1A2B4A" stroke-width="1.5"/>
    <line x1="58.7" y1="68" x2="58.7" y2="75" stroke="#1A2B4A" stroke-width="1.5"/>

    <!-- Row separator 2 -->
    <rect x="12" y="75" width="68" height="2" fill="#1A2B4A" opacity="0.55"/>

    <!-- Row 3 -->
    <rect x="12" y="77" width="68" height="12" fill="#FF6B00" opacity="0.42"/>
    <line x1="35.3" y1="77" x2="35.3" y2="89" stroke="#1A2B4A" stroke-width="1.5"/>
    <line x1="58.7" y1="77" x2="58.7" y2="89" stroke="#1A2B4A" stroke-width="1.5"/>

  </g>

  <!-- Subtle inner border for depth -->
  <rect x="4" y="4" width="84" height="84" rx="20"
        fill="none" stroke="white" stroke-width="1" opacity="0.08"/>


  <!-- ══ LOGOTYPE ══ -->

  <!-- Eyebrow / tagline above company name -->
  <text x="110" y="33"
    font-family="'Arial', 'Helvetica Neue', Helvetica, sans-serif"
    font-size="11"
    font-weight="700"
    fill="#FF6B00"
    letter-spacing="6">СОНЯЧНІ СИСТЕМИ</text>

  <!-- Thin orange separator line -->
  <rect x="110" y="39" width="268" height="2" rx="1" fill="#FF6B00" opacity="0.35"/>

  <!-- Company name -->
  <text x="108" y="72"
    font-family="'Arial Black', 'Arial', 'Helvetica Neue', Helvetica, sans-serif"
    font-size="42"
    font-weight="900"
    fill="#1A2B4A"
    letter-spacing="5">САХАРА</text>

  <!-- Orange dot accent after name -->
  <circle cx="381" cy="60" r="5" fill="#FF6B00"/>

</svg>
